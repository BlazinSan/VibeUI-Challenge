    </button>
    <button data-route="apply" onclick="window.app.switchView('apply')" class="mobile-nav-button" aria-label="Reseller">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0112 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0M12 12.75h.008v.008H12v-.008z"/></svg>
      Resell
    </button>
  </nav>

  <!-- ============================================ -->
  <!-- SHOPPING CART SLIDE OUT DRAWER               -->
  <!-- ============================================ -->
  <div id="cart-drawer" class="fixed inset-y-0 right-0 w-full max-w-md bg-background-card border-l border-background-dark shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col justify-between">
    <!-- Header -->
    <div class="h-20 border-b border-secondary/5 px-6 flex items-center justify-between">
      <h3 class="font-display font-bold text-lg text-primary flex items-center gap-2">
        <svg class="w-5.5 h-5.5 text-accent" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.2 0 .75.75 0 011.2 0zm12.75 0a.75.75 0 11-1.2 0 .75.75 0 011.2 0z"/></svg>
        My Cart
      </h3>
      <button onclick="window.app.closeCartDrawer()" class="text-secondary/40 hover:text-primary p-2 rounded-full hover:bg-background transition-colors cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    
    <!-- Items (Scrollable List) -->
    <div id="cart-drawer-items" class="flex-grow p-6 space-y-4 overflow-y-auto">
      <!-- Injected dynamically -->
    </div>

    <!-- Bottom Pricing calculation -->
    <div id="cart-drawer-footer" class="p-6 border-t border-secondary/5 bg-background/30">
      <!-- Injected dynamically -->
    </div>
  </div>

  <!-- ============================================ -->
  <!-- DETAILS LIGHTBOX MODAL                       -->
  <!-- ============================================ -->
  <div id="details-modal" class="fixed inset-0 z-50 bg-primary-dark/50 backdrop-blur-sm hidden items-center justify-center">
    <div class="absolute inset-0 cursor-pointer" onclick="window.app.closeMealDetails()"></div>
    <div id="modal-content-inner" class="relative z-10 w-full max-w-4xl flex items-center justify-center">
      <!-- Content injected dynamically -->
    </div>
  </div>

  <!-- App Main Bundle -->
  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
